<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Base | Members Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script>
        if(localStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'index.html';
        }
    </script>
</head>
<body style="background-color: var(--bg-primary);">
    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span style="color: var(--accent-primary);">ALVORIYA</span>
            </a>
            <button class="mobile-toggle" aria-label="Toggle Navigation">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <nav class="nav-menu">
                <!-- Javascript will overwrite this via Admin injection -->
            </nav>
        </div>
    </header>

    <main>
        <section class="section" style="padding-top: 5rem;">
            <div class="container">
                <div class="section-header">
                    <h2>Members Directory</h2>
                    <p>Live members.sqlite database pull.</p>
                </div>
                
                <div style="background: var(--bg-secondary); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-md); border: 1px solid var(--border-color); overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left; min-width: 600px;">
                        <thead>
                            <tr style="background-color: rgba(212, 175, 55, 0.1); border-bottom: 2px solid var(--accent-primary);">
                                <th style="padding: 1rem; color: var(--text-primary);">Member ID</th>
                                <th style="padding: 1rem; color: var(--text-primary);">Full Name</th>
                                <th style="padding: 1rem; color: var(--text-primary);">Email Address</th>
                                <th style="padding: 1rem; color: var(--text-primary);">Join Date</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- Injected by script.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
